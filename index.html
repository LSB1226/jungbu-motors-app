<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>중부모터스 입고 현황</title>
  <style>
    html{
      font-size:85%;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:"Pretendard","SUIT","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,"Noto Sans KR","Segoe UI",sans-serif;
      color:#f8fafc;
      background:
        radial-gradient(circle at 18% 8%,rgba(82,116,150,.20),transparent 28%),
        radial-gradient(circle at 85% 38%,rgba(20,184,166,.12),transparent 30%),
        linear-gradient(180deg,#18212b 0%,#091015 100%);
      min-height:100vh;
    }
    .app{max-width:500px;margin:0 auto;padding:22px 15px 38px}
    .logo-wrap{
      display:flex;align-items:center;gap:10px;
      margin:0 0 36px 30px;
      filter:drop-shadow(0 8px 5px rgba(0,0,0,.55));
    }
    .grade{
      width:30px;height:55px;border-radius:7px;
      background:linear-gradient(180deg,#19469d,#08275f);
      border:2px solid #e7edf6;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 5px 8px rgba(0,0,0,.5);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-weight:900;line-height:1;color:#fff;flex:0 0 auto;
    }
    .grade .one{font-size:28px}
    .grade .txt{font-size:12px;margin-top:1px}
    .logo-text{
      font-size:39px;font-weight:900;letter-spacing:-4px;white-space:nowrap;
      transform:skewX(-8deg);
      background:linear-gradient(180deg,#fff 0%,#f8fafc 32%,#8b929c 70%,#fff 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-shadow:0 5px 1px rgba(0,0,0,.5);
    }

    .logo-built{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:13px;
      margin:0 auto 38px;
      width:100%;
      max-width:470px;
      filter:drop-shadow(0 9px 6px rgba(0,0,0,.55));
      transform:skewX(-5deg);
    }
    .grade-mark{
      width:39px;
      height:64px;
      border-radius:8px;
      background:linear-gradient(180deg,#2b68d8 0%,#16408f 54%,#09225c 100%);
      border:2px solid rgba(241,245,249,.96);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.20),0 5px 10px rgba(0,0,0,.45);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:white;
      flex:0 0 auto;
      transform:skewX(5deg);
      line-height:.9;
    }
    .grade-one{
      font-size:34px;
      font-weight:950;
      letter-spacing:-2px;
      margin-top:1px;
    }
    .grade-geup{
      font-size:15px;
      font-weight:950;
      margin-top:2px;
      letter-spacing:-1px;
    }
    .built-logo-text{
      font-family:"Arial Black","Pretendard","SUIT","Noto Sans KR",sans-serif;
      font-size:50px;
      font-weight:950;
      letter-spacing:-5.2px;
      line-height:1;
      white-space:nowrap;
      transform:scaleX(1.08);
      transform-origin:left center;
      background:linear-gradient(180deg,#ffffff 0%,#f8fafc 32%,#8f98a5 68%,#ffffff 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 5px 1px rgba(0,0,0,.55);
    }

    .head-row{
      display:flex;align-items:flex-end;justify-content:space-between;
      margin-bottom:22px;gap:12px;
    }
    .section-title{
      position:relative;
      padding-left:24px;
      font-size:22px;font-weight:900;letter-spacing:-1px;color:#fff;
      line-height:1.25;
    }
    .section-title:before{
      content:"";position:absolute;left:0;top:-11px;
      width:29px;height:56px;border:1.5px solid rgba(148,163,184,.35);
      border-right:0;border-radius:14px 0 0 14px;
    }
    .section-title:after{
      content:"";position:absolute;left:24px;bottom:-12px;
      width:86px;height:3px;border-radius:99px;
      background:linear-gradient(90deg,#f7d47f 0%,rgba(247,212,127,.7) 65%,transparent);
      box-shadow:0 0 8px rgba(247,212,127,.45);
    }
    .assign-btn{
      display:flex;align-items:center;justify-content:center;gap:9px;
      min-width:148px;
      border:1.5px solid #f1c66c;
      color:#ffe6a3;
      background:rgba(10,16,24,.64);
      border-radius:17px;
      padding:12px 13px;
      font-size:15px;font-weight:900;
      box-shadow:0 11px 22px rgba(0,0,0,.35),inset 0 0 22px rgba(241,198,108,.08);
    }
    .circle-plus{
      width:29px;
      height:29px;
      border:2.4px solid currentColor;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:21px;
      font-weight:900;
      line-height:0;
      padding-bottom:2px;
      flex:0 0 auto;
    }
    button,input,textarea{font-family:inherit}
    button{border:0;cursor:pointer}
    .home-card{
      width:100%;min-height:138px;border-radius:21px;margin-bottom:18px;
      padding:22px 16px 22px 18px;
      display:grid;grid-template-columns:64px 1fr auto 18px;gap:13px;align-items:center;
      border:1px solid rgba(148,163,184,.24);
      box-shadow:0 14px 30px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);
      color:#fff;position:relative;overflow:hidden;text-align:left;
    }
    .home-card:after{
      content:"";position:absolute;inset:0;
      background:
        radial-gradient(circle at 20% 0%,rgba(255,255,255,.10),transparent 42%),
        linear-gradient(90deg,rgba(255,255,255,.03),transparent);
      pointer-events:none;
    }
    .home-card.all{background:linear-gradient(135deg,rgba(43,56,75,.94),rgba(13,21,32,.92))}
    .home-card.green{background:linear-gradient(135deg,rgba(8,91,72,.98),rgba(5,50,45,.91))}
    .home-card.blue{background:linear-gradient(135deg,rgba(30,67,121,.98),rgba(9,24,45,.93))}
    .home-card.purple{background:linear-gradient(135deg,rgba(62,42,101,.98),rgba(24,17,42,.94))}
    .iconbox{
      position:relative;z-index:1;
      width:62px;height:62px;border-radius:18px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:inset 0 0 24px rgba(255,255,255,.08);
    }
    .icon{
      width:35px;height:35px;display:block
    }
    .card-main{position:relative;z-index:1;min-width:0;display:flex;align-items:center;min-height:62px}
    .card-title{
      font-size:22px;font-weight:900;letter-spacing:-0.6px;line-height:1.18;
      margin-bottom:0;text-shadow:0 2px 3px rgba(0,0,0,.25);
      display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    }
    .role-badge{display:none;}
    .card-sub{display:none}
    .card-count{
      position:relative;z-index:1;display:flex;align-items:baseline;gap:4px;
      font-weight:900;text-shadow:0 2px 3px rgba(0,0,0,.3);white-space:nowrap;
    }
    .card-count .num{font-size:31px;letter-spacing:-1px}
    .card-count .dae{font-size:14px;color:#cbd5e1;font-weight:900}
    .arrow{position:relative;z-index:1;font-size:34px;color:#fff;opacity:.92;font-weight:300}
    .footer-note{
      margin-top:24px;padding:14px 12px;border-radius:15px;
      background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.055);
      color:#e5e7eb;font-size:15px;font-weight:900;text-align:center;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .footer-note b{color:#f6d47d}
    .footer-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:27px;
      height:27px;
      margin-right:9px;
      vertical-align:-7px;
      color:#f6d47d;
    }
    .footer-icon svg{
      width:27px;
      height:27px;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
    }

    .topbar{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
    .topbar button,.filter-clear{
      border-radius:16px;padding:13px 10px;font-weight:900;font-size:15px;color:#e5e7eb;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)
    }
    .topbar .add{
      background:linear-gradient(135deg,#334155,#1e293b);
      color:#e2e8f0;
      border:1px solid rgba(148,163,184,.25);
      box-shadow:0 10px 20px rgba(216,166,74,.18);
    }
    .page-title{font-size:30px;font-weight:900;letter-spacing:-1px;margin:10px 2px 12px}
    .title-count{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#f8fafc;font-size:15px;font-weight:950;vertical-align:3px}
    .topbar.single{grid-template-columns:1fr}
    .unassigned-count{display:inline-flex;align-items:center;justify-content:center;margin-left:4px;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#f8fafc;font-size:13px;font-weight:950;line-height:1.1}
    .filter{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:13px;margin-bottom:14px}
    .filter-title{font-size:13px;color:#cbd5e1;font-weight:900;margin-bottom:8px}
    .filter-row{display:grid;grid-template-columns:1fr .62fr;gap:8px}
    input,textarea{
      width:100%;border:1px solid rgba(255,255,255,.09);background:rgba(15,23,42,.74);
      color:#fff;border-radius:15px;padding:13px 12px;font-size:16px;font-weight:850;outline:none
    }
    input[type=date]{color-scheme:dark}
    textarea{min-height:92px;resize:vertical;line-height:1.45}
    textarea::placeholder{color:#94a3b8}
    .car-card{border-radius:21px;background:linear-gradient(135deg,rgba(30,41,59,.94),rgba(15,23,42,.9));border:1px solid rgba(148,163,184,.16);box-shadow:0 12px 26px rgba(0,0,0,.26);padding:16px;margin-bottom:13px}
    .car-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .model{
      color:#f8fafc;
      font-size:29px;
      font-weight:900;
      letter-spacing:-1px;
      text-shadow:0 1px 3px rgba(0,0,0,.28);
    }
    .plate{
      color:#cbd5e1;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.4px;
      margin-top:4px;
    }
    .process{
      border-radius:999px;
      padding:7px 10px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }
    .process.body{background:rgba(59,130,246,.18);border-color:rgba(96,165,250,.34);color:#bfdbfe}
    .process.paint{background:rgba(168,85,247,.18);border-color:rgba(192,132,252,.34);color:#e9d5ff}
    .process.assembly{background:rgba(245,158,11,.18);border-color:rgba(251,191,36,.34);color:#fde68a}
    .process.wash{background:rgba(34,197,94,.18);border-color:rgba(74,222,128,.34);color:#bbf7d0}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px}
    .info.wide{grid-column:1 / -1;min-height:64px}
    .info{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.06);border-radius:15px;padding:11px;min-height:58px}
    .label{color:#94a3b8;font-size:12px;font-weight:950}
    .value{color:#fff;font-size:15px;font-weight:900;margin-top:4px;word-break:break-word}
    .updated{margin-top:10px;text-align:right;color:#94a3b8;font-size:12px;font-weight:800}
    .btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:13px}
    .action{border-radius:15px;padding:12px 7px;font-weight:900;background:rgba(255,255,255,.1);color:#fff;font-size:15px}
    .action.dark{
      background:linear-gradient(135deg,#e5e7eb,#cbd5e1);
      color:#0f172a;
      box-shadow:0 7px 14px rgba(203,213,225,.12);
    }
    .action.done{background:linear-gradient(135deg,#ef4444,#991b1b);color:white;box-shadow:0 8px 16px rgba(239,68,68,.23)}
    .form{border-radius:24px;background:linear-gradient(135deg,rgba(30,41,59,.94),rgba(15,23,42,.92));border:1px solid rgba(148,163,184,.16);box-shadow:0 12px 26px rgba(0,0,0,.26);padding:17px}
    .field{margin-bottom:15px}.field-title{font-size:14px;font-weight:900;color:#cbd5e1;margin-bottom:8px}
    .choice{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.choice.process-choice{grid-template-columns:1fr 1fr}
    .choice button{border-radius:15px;padding:13px 5px;min-height:48px;background:rgba(255,255,255,.08);color:#dbeafe;border:1px solid rgba(255,255,255,.08);font-size:14px;font-weight:950}
    .choice button.active{background:#e5e7eb;color:#0f172a}
    .save{width:100%;border-radius:18px;padding:16px;background:linear-gradient(135deg,#0f766e,#164e63);color:white;font-size:18px;font-weight:900;box-shadow:0 12px 22px rgba(15,118,110,.22)}
    .empty{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;border-radius:20px;padding:30px 16px;text-align:center;font-weight:950}
    .modal-wrap{position:fixed;inset:0;display:none;align-items:flex-end;z-index:50;padding:12px;background:rgba(0,0,0,.62)}
    .modal{width:100%;max-width:520px;margin:0 auto;background:#111827;border-radius:24px;padding:17px;max-height:88vh;overflow:auto;border:1px solid rgba(255,255,255,.1)}
    .modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.modal-title h2{margin:0;font-size:25px;font-weight:950}
    .close{width:38px;height:38px;border-radius:999px;background:rgba(255,255,255,.1);color:#fff;font-weight:950}
    .detail-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:8px;
    }
    .detail-line{
      background:rgba(255,255,255,.07);
      border-radius:15px;
      padding:12px;
      margin-bottom:0;
      min-height:64px;
    }
    .detail-line.wide{
      grid-column:1 / -1;
      min-height:62px;
    }
    .detail-label{font-size:12px;font-weight:900;color:#94a3b8}.detail-value{font-size:16px;font-weight:900;color:#fff;margin-top:5px;white-space:pre-wrap;word-break:break-word}
  
    .role-badge{
      color:#f8fafc !important;
      background:rgba(255,255,255,.05) !important;
      border:1px solid rgba(255,255,255,.18) !important;
      padding:4px 10px !important;
      border-radius:999px;
      font-size:14px !important;
      font-weight:900 !important;
      opacity:.96;
    }
    .green .role-badge,
    .blue .role-badge,
    .purple .role-badge{
      color:#f8fafc !important;
      background:transparent !important;
      border:0 !important;
    }

    .home-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:-18px 0 18px;
    }
    .home-actions .assign-btn{
      width:100%;
      min-width:0;
      padding:12px 8px;
    }
    .lookup-box{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:13px;
      margin-bottom:20px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }
    .lookup-title{
      font-size:13px;
      color:#cbd5e1;
      font-weight:900;
      margin-bottom:8px;
    }
    .lookup-box input{
      font-size:15px;
    }
    .lookup-results{
      margin-top:10px;
    }
    .lookup-item{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px;
      margin-top:8px;
      border-radius:15px;
      background:rgba(15,23,42,.75);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      text-align:left;
    }
    .lookup-main{
      min-width:0;
    }
    .lookup-model{
      font-size:16px;
      font-weight:950;
      color:#fff;
    }
    .lookup-plate{
      font-size:13px;
      font-weight:900;
      color:#cbd5e1;
      margin-top:3px;
    }
    .lookup-tag{
      font-size:12px;
      font-weight:950;
      color:#f6d47d;
      white-space:nowrap;
    }
    .home-section-gap{
      margin-top:6px;
    }
    .process{
      font-size:13.5px;
      padding:8px 11px;
      letter-spacing:-.2px;
    }


    /* IMAGE STYLE HOME DASHBOARD */
    body{
      background:
        radial-gradient(circle at 88% 0%,rgba(37,99,235,.22),transparent 28%),
        radial-gradient(circle at 12% 10%,rgba(59,130,246,.10),transparent 25%),
        linear-gradient(180deg,#06111e 0%,#02070d 100%) !important;
    }
    .app{max-width:468px;padding:28px 18px 34px !important}
    .home-top{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:flex-start;
      gap:8px;
      margin-bottom:17px;
    }
    .home-top .logo-wrap{
      margin:0 !important;
      gap:8px;
      filter:drop-shadow(0 7px 8px rgba(0,0,0,.65));
      min-width:0;
    }
    .home-top .grade{
      width:42px !important;
      height:58px !important;
      border-radius:4px !important;
      transform:skewX(-7deg);
      background:linear-gradient(180deg,#2357b6 0%,#12326f 100%) !important;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.16),0 5px 12px rgba(0,0,0,.55) !important;
    }
    .home-top .grade .one{font-size:32px !important;line-height:.82;transform:skewX(7deg)}
    .home-top .grade .txt{font-size:13px !important;transform:skewX(7deg)}
    .home-top .logo-text{
      font-size:35px !important;
      letter-spacing:-4px !important;
      text-shadow:0 4px 1px rgba(0,0,0,.6),0 0 18px rgba(255,255,255,.08) !important;
      transform:skewX(-8deg) scaleX(1.02) !important;
      line-height:1;
    }
    .home-top .assign-btn{
      min-width:135px !important;
      border-radius:999px !important;
      padding:10px 12px !important;
      font-size:13px !important;
      gap:7px !important;
      color:#f8d178 !important;
      background:rgba(5,10,18,.35) !important;
      border:1.5px solid rgba(248,209,120,.9) !important;
      box-shadow:0 8px 18px rgba(0,0,0,.35),inset 0 0 18px rgba(248,209,120,.06) !important;
      flex:0 0 auto;
      align-self:flex-end;
      margin-top:-8px;
      margin-bottom:-2px;
    }
    .home-top .circle-plus{width:25px;height:25px;font-size:19px;border-width:2px;padding-bottom:1px}
    .lookup-box{
      position:relative;
      display:grid;
      grid-template-columns:44px 1fr 18px;
      align-items:center;
      gap:10px;
      min-height:58px;
      border-radius:14px !important;
      padding:8px 16px !important;
      margin:0 0 11px !important;
      background:linear-gradient(135deg,rgba(21,34,51,.95),rgba(5,13,23,.92)) !important;
      border:1px solid rgba(101,124,153,.35) !important;
      box-shadow:0 16px 30px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.07) !important;
      overflow:hidden;
    }
    .lookup-box:before{
      content:"";
      width:38px;
      height:38px;
      border-radius:12px;
      background:linear-gradient(145deg,rgba(42,59,82,.96),rgba(13,23,38,.96));
      border:1px solid rgba(148,163,184,.28);
      box-shadow:inset 0 0 24px rgba(255,255,255,.06),0 9px 18px rgba(0,0,0,.35);
      grid-row:1 / span 2;
      align-self:center;
      justify-self:center;
    }
    .lookup-box:after{
      content:"›";
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#94a3b8;
      font-size:24px;
      font-weight:200;
    }
    .lookup-icon{
      position:absolute;
      left:38px;
      top:50%;
      transform:translate(-50%,-50%);
      width:21px;
      height:21px;
      pointer-events:none;
      z-index:2;
      opacity:.95;
    }
    .lookup-title{
      grid-column:2;
      margin:0 0 1px !important;
      font-size:16px !important;
      line-height:1.08;
      color:#f8fafc !important;
      font-weight:950 !important;
      letter-spacing:-.8px;
    }
    .lookup-box input{
      grid-column:2;
      padding:0 !important;
      border:0 !important;
      border-radius:0 !important;
      background:transparent !important;
      color:#cbd5e1 !important;
      font-size:12px !important;
      font-weight:800 !important;
      box-shadow:none !important;
    }
    .lookup-box input::placeholder{color:#94a3b8;opacity:.45}
    .lookup-results{grid-column:1 / -1;margin-top:10px !important;z-index:3}
    .unassigned-bar{
      width:100%;

    const editingCar=cars.find(x=>x.id===editId);

  const root=document.getElementById("root");
  if(screen==="home"){
    root.innerHTML=logoHeader()+homeCard("all",carIcon(),"전체","전체 차량 현황",activeCars().length,"all")+homeCard("pink",userIcon(),"권태훈","담당 차량 현황",countByOwner("권태훈"),"owner","권태훈")+homeCard("blue",userIcon(),"김평남","담당 차량 현황",countByOwner("김평남"),"owner","김평남")+homeCard("green",userIcon(),"송대성","담당 차량 현황",countByOwner("송대성"),"owner","송대성")+homeCard("purple",checkIcon(),"출고 완료 차량","출고 완료된 차량 내역",completedCars().length,"completed")+`<div class="footer-note"><span class="footer-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 5-3.2 8.4-7 10-3.8-1.6-7-5-7-10V6l7-3z"/><path d="M8.5 12.2l2.2 2.2 4.8-5"/></svg></span>모든 차량은 <b>정확한 관리</b>로 안전하게 책임집니다.</div>`;
    const search=document.getElementById("vehicleSearch");
    if(search){search.value=searchQuery;renderLookupResults()}
    return;
  }
  if(screen==="form"){
    const editingCar=cars.find(x=>x.id===editId);
    const isNew=!editId;
    const unassignedEdit=editId && isUnassigned(editingCar||{});
    const assignedEdit=editId && !unassignedEdit;
    let formHtml="";
    if(isNew && formMode==="unassigned"){
      formHtml=`${fieldInput("차종","model",form.model)}${fieldInput("차량번호","plate",form.plate)}<div class="field"><div class="field-title">입고일자</div><input id="intakeDate" type="date" value="${esc(form.intakeDate)}"></div><div class="field"><div class="field-title">특이사항</div><textarea id="special">${escapeHtml(form.special)}</textarea></div>`;
    }else if(isNew){
      if(formMode==="processAdd"){
        formHtml=`${fieldInput("차종","model",form.model)}${fieldInput("차량번호","plate",form.plate)}<div class="field"><div class="field-title">휠 얼라이먼트</div><div class="choice">${ALIGN.map(v=>`<button class="${form.alignment===v?"active":""}" onclick="setChoice('alignment','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">입고일자</div><input id="intakeDate" type="date" value="${esc(form.intakeDate)}"></div><div class="field"><div class="field-title">출고예정일자</div><input id="dueDate" type="date" value="${esc(form.dueDate)}"></div><div class="field"><div class="field-title">직원배정</div><div class="choice">${STAFF.map(v=>`<button class="${form.owner===v?"active":""}" onclick="setChoice('owner','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">현재공정</div><div class="choice process-choice">${PROCESS.map(v=>`<button class="${form.process===v?"active":""}" onclick="setChoice('process','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">담당자 메모</div><textarea id="memo">${escapeHtml(form.memo)}</textarea></div><div class="field"><div class="field-title">특이사항</div><textarea id="special">${escapeHtml(form.special)}</textarea></div>`;
      }else{
        formHtml=`${fieldInput("차종","model",form.model)}${fieldInput("차량번호","plate",form.plate)}<div class="field"><div class="field-title">휠 얼라이먼트</div><div class="choice">${ALIGN.map(v=>`<button class="${form.alignment===v?"active":""}" onclick="setChoice('alignment','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">입고일자</div><input id="intakeDate" type="date" value="${esc(form.intakeDate)}"></div><div class="field"><div class="field-title">출고예정일자</div><input id="dueDate" type="date" value="${esc(form.dueDate)}"></div><div class="field"><div class="field-title">직원배정</div><div class="choice">${STAFF.map(v=>`<button class="${form.owner===v?"active":""}" onclick="setChoice('owner','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">전달사항</div><textarea id="memo">${escapeHtml(form.memo)}</textarea></div>`;
      }
    }else{
      formHtml=`${fieldInput("차종","model",form.model)}${fieldInput("차량번호","plate",form.plate)}<div class="field"><div class="field-title">휠 얼라이먼트</div><div class="choice">${ALIGN.map(v=>`<button class="${form.alignment===v?"active":""}" onclick="setChoice('alignment','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">입고일자</div><input id="intakeDate" type="date" value="${esc(form.intakeDate)}"></div><div class="field"><div class="field-title">출고예정일자</div><input id="dueDate" type="date" value="${esc(form.dueDate)}"></div>${unassignedEdit?`<div class="field"><div class="field-title">담당자 추가</div><div class="choice">${STAFF.map(v=>`<button class="${form.owner===v?"active":""}" onclick="setChoice('owner','${v}')">${v}</button>`).join("")}</div></div>`:""}${assignedEdit?`<div class="field"><div class="field-title">현재공정</div><div class="choice process-choice">${PROCESS.map(v=>`<button class="${form.process===v?"active":""}" onclick="setChoice('process','${v}')">${v}</button>`).join("")}</div></div><div class="field"><div class="field-title">담당자 메모</div><textarea id="memo">${escapeHtml(form.memo)}</textarea></div><div class="field"><div class="field-title">특이사항</div><textarea id="special">${escapeHtml(form.special)}</textarea></div>`:`<div class="field"><div class="field-title">특이사항</div><textarea id="special">${escapeHtml(form.special)}</textarea></div>`}`;
    }
    root.innerHTML=`<div class="topbar single"><button onclick="goBack()">← 뒤로가기</button></div><div class="page-title">${titleText()}</div><div class="form">${formHtml}<button class="save" onclick="saveCar()">저장하기</button></div>`;
    return;
  }
  const list=currentCars();
  const dateLabel=screen==="completed"?"출고완료일자 필터":"출고예정일자 필터";
  const filterHtml=screen==="unassigned"?"":`<div class="filter"><div class="filter-title">${dateLabel}</div><div class="filter-row"><input type="date" value="${esc(dueFilter)}" onchange="setFilterDate(this.value)"><button class="filter-clear" onclick="clearFilter()">필터해제</button></div></div>`;
  const topbarHtml=screen==="completed"?`<div class="topbar single"><button onclick="goBack()">← 뒤로가기</button></div>`:`<div class="topbar"><button onclick="goBack()">← 뒤로가기</button><button class="add" onclick="${screen==="unassigned"?"openUnassignedAdd()":"openAdd()"}"><span class="circle-plus" style="width:19px;height:19px;font-size:13px;margin-right:5px;">+</span> 추가</button></div>`;
  root.innerHTML=`${topbarHtml}<div class="page-title">${titleText()}</div>${filterHtml}${list.length===0?`<div class="empty">등록된 차량이 없습니다.</div>`:list.map(carCard).join("")}`
}
function setSearchQuery(v){searchQuery=v;renderLookupResults()}

function disableAutoComplete(){
  document.querySelectorAll("input, textarea").forEach((el,i)=>{
    el.setAttribute("autocomplete","off");
    el.setAttribute("autocorrect","off");
    el.setAttribute("autocapitalize","off");
    el.setAttribute("spellcheck","false");
    el.setAttribute("aria-autocomplete","none");
    if(!el.getAttribute("name")) el.setAttribute("name","no_autofill_"+i);
  });
}
function renderLookupResults(){
  const box=document.getElementById("lookupResults");
  if(!box)return;
  const q=(searchQuery||"").trim().toLowerCase();
  if(!q){box.innerHTML="";return}
  const result=cars.filter(c=>`${c.model||""} ${c.plate||""} ${c.owner||""}`.toLowerCase().includes(q)).slice(0,12);
  box.innerHTML=result.length?result.map(c=>`<button class="lookup-item" onclick="openDetail('${c.id}')"><div class="lookup-main"><div class="lookup-model">${escapeHtml(c.model||"-")}</div><div class="lookup-plate">${escapeHtml(c.plate||"-")}</div></div><div class="lookup-tag">${lookupStatus(c)}</div></button>`).join(""):`<div class="empty" style="padding:16px;margin-top:8px;">조회 결과가 없습니다.</div>`;
}
function lookupStatus(c){if(isCompleted(c))return"출고완료";if(isUnassigned(c))return"미배정";return c.owner||"-"}
function homeCard(color,icon,title,sub,count,type,owner=""){let click=type==="all"?"openAll()":type==="completed"?"openCompleted()":`openOwner('${owner}')`;return`<button class="home-card ${color}" onclick="${click}"><div class="iconbox">${icon}</div><div class="card-main"><div class="card-title">${title}</div><div class="card-sub">${sub}</div></div><div class="card-count"><span class="num">${count}</span><span class="dae">대</span></div><div class="arrow">›</div></button>`}
function carIcon(){return`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l1.4-4.2A2.5 2.5 0 0 1 8.8 6h6.4a2.5 2.5 0 0 1 2.4 1.8L19 12"/><path d="M4 12h16v6H4z"/><circle cx="7.5" cy="16" r="1.2"/><circle cx="16.5" cy="16" r="1.2"/><path d="M6 18v1.5M18 18v1.5"/></svg>`}
function checkIcon(){return`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M8.5 12.4l2.2 2.2 4.9-5.2"/></svg>`}
function clipboardIcon(){return`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="4" width="10" height="17" rx="2"/><path d="M9 4.5h6"/><path d="M9.5 9h5"/><path d="M9.5 13h5"/><path d="M9.5 17h3"/></svg>`}
function userIcon(){return`<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4.5 21c1.7-4.4 13.3-4.4 15 0"/></svg>`}
function processClass(v){
 const p=convertOldProcess(v||"");
 if(p==="판금작업중") return "body";
 if(p==="도장작업중") return "paint";
 if(p==="조립중") return "assembly";
 if(p==="세차완료") return "wash";
 return "";
}
function fieldInput(label,id,value){return`<div class="field"><div class="field-title">${label}</div><input id="${id}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" value="${esc(value)}"></div>`}
function carCard(c){
  const completed=isCompleted(c);
  const unassigned=isUnassigned(c);
  const dateInfo=completed?info("출고완료일자",c.completedAt||"미정"):info("출고예정일자",c.dueDate||"미정");
  const memoBlock=completed?info("담당자 메모",c.memo||"없음","wide"):info("담당자 메모",c.memo||"없음","wide");
  let buttons="";
  if(completed){
    buttons=`<button class="action dark" onclick="openEdit('${c.id}')">편집</button><button class="action" onclick="openDetail('${c.id}')">상세보기</button><button class="action done" onclick="deleteCompleted('${c.id}')">삭제</button>`;
  }else if(unassigned || screen==="unassigned"){
    buttons=`<button class="action dark" onclick="openEdit('${c.id}')">편집</button><button class="action done" onclick="deleteUnassigned('${c.id}')">삭제</button>`;
  }else{
    buttons=`<button class="action dark" onclick="openEdit('${c.id}')">상태변경</button><button class="action" onclick="openDetail('${c.id}')">상세보기</button><button class="action done" onclick="completeCar('${c.id}')">출고완료</button>`;
  }
  const gridCols=(unassigned||screen==="unassigned")&&!completed?` style="grid-template-columns:1fr 1fr;"`:"";
  const processHtml=(completed||unassigned)?"":`<span class="process ${processClass(c.process)}">${escapeHtml(convertOldProcess(c.process||""))}</span>`;
  const infoHtml=unassigned&&!completed?`${info("담당자","미배정")}${info("특이사항",c.special||"없음","wide")}`:`${info("담당자",unassigned?"미배정":c.owner)}${info("휠 얼라이먼트",c.alignment)}${info("입고일자",c.intakeDate||"미정")}${dateInfo}${memoBlock}`;
  return`<div class="car-card"><div class="car-head"><div><div class="model">${escapeHtml(c.model)}</div><div class="plate">${escapeHtml(c.plate)}</div></div>${processHtml}</div><div class="info-grid">${infoHtml}</div><div class="updated">최근수정 ${escapeHtml(c.updatedAt||"-")}</div><div class="btn-row"${gridCols}>${buttons}</div></div>`
}
function info(l,v,cls=""){return`<div class="info ${cls}"><div class="label">${l}</div><div class="value">${escapeHtml(v||"")}</div></div>`}
function openDetail(id){
  const c=cars.find(x=>x.id===id);if(!c)return;
  const completed=isCompleted(c);
  const unassigned=isUnassigned(c);
  const dateLine=completed?detail("출고완료일자",c.completedAt||"미정"):detail("출고예정일자",c.dueDate||"미정");
  const processLine=completed?"":detail("현재공정",convertOldProcess(c.process||""));
  const detailInfo=unassigned&&!completed?`${detail("차종",c.model)}${detail("차량번호",c.plate)}${detail("담당자","미배정")}${detail("특이사항",c.special||"없음","wide")}`:`${detail("차종",c.model)}${detail("차량번호",c.plate)}${detail("담당자",unassigned?"미배정":c.owner)}${processLine}${detail("휠 얼라이먼트",c.alignment)}${detail("입고일자",c.intakeDate||"미정")}${dateLine}${detail("담당자 메모",c.memo||"없음","wide")}${detail("특이사항",c.special||"없음","wide")}`;
  let btns="";
  if(completed){
    btns=`<button class="action dark" onclick="openEdit('${c.id}')">편집</button><button class="action done" onclick="deleteCompleted('${c.id}')">삭제</button>`;
  }else if(unassigned){
    btns=`<button class="action dark" onclick="openEdit('${c.id}')">편집</button><button class="action done" onclick="deleteUnassigned('${c.id}')">삭제</button>`;
  }else{
    btns=`<button class="action dark" onclick="openEdit('${c.id}')">상태변경</button><button class="action done" onclick="completeCar('${c.id}')">출고완료</button>`;
  }
  document.getElementById("modal").innerHTML=`<div class="modal-title"><h2>상세보기</h2><button class="close" onclick="closeModal()">×</button></div><div class="detail-grid">${detailInfo}</div><div class="btn-row" style="grid-template-columns:1fr 1fr;">${btns}</div>`;
  document.getElementById("modalWrap").style.display="flex";
  const modal=document.getElementById("modal");if(modal)modal.scrollTop=0;
  modalOpen=true;
  history.pushState({screen,selectedOwner,editId,dueFilter,modal:true},"")
}
function detail(l,v,cls=""){return`<div class="detail-line ${cls}"><div class="detail-label">${l}</div><div class="detail-value">${escapeHtml(String(v||""))}</div></div>`}
function escapeHtml(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function esc(s){return escapeHtml(s).replaceAll("\n"," ")}
document.getElementById("modalWrap").addEventListener("click",e=>{if(e.target.id==="modalWrap")closeModal()})
window.addEventListener("popstate",e=>{
  if(afterSaveBackHome){
    afterSaveBackHome=false;
    screen="home";
    selectedOwner=null;
    editId=null;
    dueFilter="";
    closeModal();
    history.replaceState({screen:"home",selectedOwner:null,editId:null,dueFilter:""},"");
    render();
    forceTop();
    return;
  }

  if(modalOpen){
    closeModal();
  }
  if(e.state){
    screen=e.state.screen||"home";
    selectedOwner=e.state.selectedOwner||null;
    editId=e.state.editId||null;
    dueFilter=e.state.dueFilter||"";
  }else{
    screen="home";
    selectedOwner=null;
    editId=null;
    dueFilter="";
  }
  render();
})
history.replaceState({screen:"home",selectedOwner:null,editId:null,dueFilter:""},"")
render();
carsRef.onSnapshot(snapshot=>{
  cars=snapshot.docs.map(doc=>({id:doc.id,...doc.data(),process:convertOldProcess((doc.data().process)||"")})).sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
  render();
  if(pendingTopScroll){
    pendingTopScroll=false;
    forceTop();
    setTimeout(forceTop,0);
    setTimeout(forceTop,80);
  }
});</script>
</body>
</html>
